<body>

  <h1>Inscreva-se</h1>

  <!-- Um único formulário que engloba todas as seções -->
  <form id="inscricaoForm" style="width:1327px;" onsubmit="return validarFormulario(event);">
    <fieldset>
      <label for="evento">Evento</label>
      <select id="evento" name="evento" required>
        <option value="" disabled selected>...selecione...</option>
        <option value="Voe sem asas">Voe sem asas</option>
        <option value="Festa junina">Festa junina</option>
        <option value="Semana da tecnologia">Semana da tecnologia</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Informação de Acesso</legend>
      <label for="usuario">Usuário</label>
      <input id="usuario" name="usuario" type="text" required>

      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" required minlength="6" />

      <label for="confirmar_senha">Confirmar Senha</label>
      <input id="confirmar_senha" name="confirmar_senha" type="password" required minlength="6" />
    </fieldset>

    <fieldset>
      <legend>Informação Pessoal</legend>
      <label for="nome">Nome Completo</label>
      <input id="nome" name="nome" type="text" required />

      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" required />
      
 <form style="width: 1320px;">
    <fieldset style="border: 2px solid black; padding: 15px;">
  <legend>Sexo</legend>
 Masculino <input type="radio" name="sexo" value="Masculino" required/>
  Feminino <input type="radio" name="sexo" value="Feminino" required />
    </fieldset>
  </form>

      <div style="margin-top:12px;">
        <label for="telefone">Telefone</label>
        <input id="telefone" name="telefone" type="tel" required pattern="\(?\d{2}\)?\s?\d{4,5}-?\d{4}" title="Formato: (00) 00000-0000" />
      </div>

      <label for="data_nascimento">Data de nascimento</label>
      <input id="data_nascimento" name="data_nascimento" type="date" required />

      <label for="cor">Cor</label>
      <input id="cor" name="cor" type="color" value="#0000ff" required />

      <label for="github">Perfil no GitHub</label>
      <input id="github" name="github" type="url" required
             pattern="https://github\.com/.+"
             placeholder="https://github.com/seuusuario"
             title="Informe o endereço completo do GitHub começando com https://github.com/" />
    </fieldset>

    <div class="actions">
      <input type="submit" value="Enviar" />
      <input type="reset" value="Limpar" />
    </div>
  </form>

  <script>
    // Validação extra: checar se as senhas conferem antes de enviar
    function validarFormulario(event) {
      const form = document.getElementById('inscricaoForm');

      // Usar validação HTML nativa primeiro
      if (!form.checkValidity()) {
        // Mostra mensagens de validação do navegador
        form.reportValidity();
        event.preventDefault();
        return false;
      }

      // Validação personalizada: senhas iguais
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar_senha').value;
      if (senha !== confirmar) {
        alert('As senhas não conferem. Por favor, verifique.');
        document.getElementById('confirmar_senha').focus();
        event.preventDefault();
        return false;
      }

      // Tudo ok — o formulário pode ser enviado
      return true;
    }
  </script>
</body>
